<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CloudMind — conversational AI interface">
  <title>CloudMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg:             #0a0a0b;
      --color-surface:        #111113;
      --color-surface-2:      #18181b;
      --color-border:         #27272a;
      --color-border-focus:   #52525b;
      --color-text-primary:   #fafafa;
      --color-text-secondary: #a1a1aa;
      --color-text-muted:     #52525b;
      --color-accent:         #6366f1;
      --color-accent-hover:   #818cf8;
      --color-user-bubble:    #1e1e2e;
      --color-error:          #f87171;
      --color-online:         #4ade80;
      --color-offline:        #f87171;

      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   16px;
      --radius-full: 9999px;

      --header-height: 56px;
      --footer-height: 80px;

      --duration-fast:   120ms;
      --duration-normal: 200ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ::selection {
      background-color: color-mix(in srgb, var(--color-accent) 30%, transparent);
    }

    /* ============================================================
       UTILITY
    ============================================================ */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-6);
      border-bottom: 1px solid var(--color-border);
      background-color: color-mix(in srgb, var(--color-bg) 80%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .brand-mark {
      display: flex;
      align-items: center;
      color: var(--color-accent);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
    }

    .brand-badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      padding: 2px var(--space-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: var(--radius-full);
      background-color: var(--color-text-muted);
      transition: background-color var(--duration-normal) var(--ease-out);
    }

    .status-dot--online {
      background-color: var(--color-online);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .status-dot--offline {
      background-color: var(--color-offline);
    }

    .status-label {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .header-actions {
      display: flex;
      align-items: center;
    }

    .header-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      color: var(--color-text-secondary);
      transition: color var(--duration-fast), background-color var(--duration-fast);
    }

    .header-link:hover {
      color: var(--color-text-primary);
      background-color: var(--color-surface-2);
    }

    /* ============================================================
       MAIN / SCROLL AREA
    ============================================================ */
    main {
      flex: 1;
      overflow-y: auto;
      padding-top: var(--header-height);
      padding-bottom: calc(var(--footer-height) + var(--space-6));
      scroll-behavior: auto;
      overscroll-behavior: contain;
    }

    main::-webkit-scrollbar {
      width: 5px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background-color: var(--color-border);
      border-radius: var(--radius-full);
    }

    main {
      scrollbar-width: thin;
      scrollbar-color: var(--color-border) transparent;
    }

    /* ============================================================
       MESSAGE LIST
    ============================================================ */
    #message-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      padding: var(--space-6) var(--space-4);
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    /* ============================================================
       MESSAGE BUBBLES
    ============================================================ */
    .message {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      animation: message-in var(--duration-normal) var(--ease-out);
    }

    .message[data-role="user"] {
      flex-direction: row-reverse;
      align-self: flex-end;
      max-width: min(640px, 85%);
    }

    .message[data-role="assistant"] {
      align-self: flex-start;
      max-width: min(680px, 92%);
    }

    .message-avatar {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background-color: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      margin-top: 2px;
    }

    .message-content {
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message[data-role="user"] .message-content {
      background-color: var(--color-user-bubble);
      border: 1px solid color-mix(in srgb, var(--color-accent) 20%, var(--color-border));
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
    }

    .message[data-role="assistant"] .message-content {
      color: var(--color-text-primary);
      padding: var(--space-2) 0;
    }

    /* ============================================================
       TYPING INDICATOR
    ============================================================ */
    .message--typing .message-content {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: var(--space-3) var(--space-2);
      height: 36px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: var(--radius-full);
      background-color: var(--color-text-muted);
      animation: bounce 600ms var(--ease-out) infinite;
      animation-delay: var(--delay, 0ms);
    }

    /* ============================================================
       ERROR MESSAGE
    ============================================================ */
    .message--error {
      align-self: stretch;
      max-width: none;
    }

    .message--error .message-content {
      font-size: 13px;
      color: var(--color-error);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid color-mix(in srgb, var(--color-error) 25%, transparent);
      background-color: color-mix(in srgb, var(--color-error) 8%, transparent);
    }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-10) var(--space-6);
      gap: var(--space-4);
      min-height: calc(100dvh - var(--header-height) - var(--footer-height) - 80px);
    }

    #empty-state.hidden {
      display: none;
    }

    .empty-brand-mark {
      color: var(--color-accent);
      opacity: 0.7;
      margin-bottom: var(--space-2);
    }

    .empty-heading {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--color-text-primary);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: calc(-1 * var(--space-2));
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .suggestion-chip {
      font-size: 13px;
      color: var(--color-text-secondary);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background-color: var(--color-surface);
      transition:
        color var(--duration-fast),
        border-color var(--duration-fast),
        background-color var(--duration-fast);
    }

    .suggestion-chip:hover {
      color: var(--color-text-primary);
      border-color: var(--color-border-focus);
      background-color: var(--color-surface-2);
    }

    /* ============================================================
       FOOTER / COMPOSER
    ============================================================ */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: var(--space-3) var(--space-4) var(--space-4);
      background-color: color-mix(in srgb, var(--color-bg) 80%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--color-border);
    }

    #composer {
      display: flex;
      align-items: flex-end;
      gap: var(--space-2);
      max-width: 760px;
      margin: 0 auto;
      background-color: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-2) var(--space-2) var(--space-2) var(--space-4);
      transition: border-color var(--duration-fast);
    }

    #composer:focus-within {
      border-color: var(--color-border-focus);
    }

    #input-field {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      color: var(--color-text-primary);
      padding: var(--space-2) 0;
      max-height: calc(6 * 1.6 * 14px + 2 * var(--space-2));
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--color-border) transparent;
    }

    #input-field::placeholder {
      color: var(--color-text-muted);
    }

    #send-btn {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      background-color: var(--color-accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        background-color var(--duration-fast),
        opacity var(--duration-fast);
    }

    #send-btn:hover:not(:disabled) {
      background-color: var(--color-accent-hover);
    }

    #send-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #send-btn .icon-send {
      display: block;
    }

    #send-btn .icon-spinner {
      display: none;
      animation: spin 700ms linear infinite;
    }

    #send-btn.is-loading .icon-send {
      display: none;
    }

    #send-btn.is-loading .icon-spinner {
      display: block;
    }

    .composer-hint {
      max-width: 760px;
      margin: var(--space-2) auto 0;
      font-size: 11px;
      color: var(--color-text-muted);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes message-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%       { transform: translateY(-4px); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <header role="banner">
    <div class="header-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false">
          <path d="M5 13.5C3.067 13.5 1.5 11.933 1.5 10C1.5 8.29 2.72 6.864 4.338 6.561C4.119 6.068 4 5.524 4 4.95C4 2.774 5.774 1 7.95 1C9.171 1 10.264 1.545 11 2.412C11.736 1.545 12.829 1 14.05 1C16.226 1 18 2.774 18 4.95C18 5.524 17.881 6.068 17.662 6.561C19.28 6.864 20.5 8.29 20.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 13.5H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M7 13.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13 13.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M5 17H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-name">CloudMind</span>
      <span class="brand-badge" aria-label="beta">beta</span>
    </div>

    <div class="header-status" aria-live="polite" aria-label="Connection status">
      <span class="status-dot" id="status-dot" aria-hidden="true"></span>
      <span class="status-label" id="status-label">Connecting...</span>
    </div>

    <button onclick="newConversation()" class="header-link" aria-label="Neues Gespräch">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="header-actions">
      <a
        href="http://localhost:8080/stats"
        target="_blank"
        rel="noopener noreferrer"
        class="header-link"
        aria-label="View server stats (opens in new tab)"
      >
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
          <rect x="1" y="9" width="3" height="6" rx="1" stroke="currentColor" stroke-width="1.25"/>
          <rect x="6.5" y="5" width="3" height="10" rx="1" stroke="currentColor" stroke-width="1.25"/>
          <rect x="12" y="1" width="3" height="14" rx="1" stroke="currentColor" stroke-width="1.25"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ============================================================
       MAIN SCROLL AREA
  ============================================================ -->
  <main id="chat-main" role="main" tabindex="-1">
    <div
      id="message-list"
      aria-label="Conversation"
      aria-live="polite"
      aria-atomic="false"
      aria-relevant="additions"
    ></div>

    <div id="empty-state" aria-hidden="false">
      <div class="empty-brand-mark" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false">
          <path d="M5 13.5C3.067 13.5 1.5 11.933 1.5 10C1.5 8.29 2.72 6.864 4.338 6.561C4.119 6.068 4 5.524 4 4.95C4 2.774 5.774 1 7.95 1C9.171 1 10.264 1.545 11 2.412C11.736 1.545 12.829 1 14.05 1C16.226 1 18 2.774 18 4.95C18 5.524 17.881 6.068 17.662 6.561C19.28 6.864 20.5 8.29 20.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 13.5H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M7 13.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13 13.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M5 17H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="empty-heading">Ask anything.</h1>
      <p class="empty-sub">Session 1 is active. Start a conversation.</p>
      <div class="suggestions" role="list">
        <button class="suggestion-chip" role="listitem" data-prompt="What can you help me with?">
          What can you help me with?
        </button>
        <button class="suggestion-chip" role="listitem" data-prompt="Explain how the CloudMind server works.">
          Explain how the CloudMind server works.
        </button>
        <button class="suggestion-chip" role="listitem" data-prompt="Write a Python function for me.">
          Write a Python function for me.
        </button>
      </div>
    </div>
  </main>

  <!-- ============================================================
       FOOTER / COMPOSER
  ============================================================ -->
  <footer role="contentinfo">
    <div id="composer" role="form" aria-label="Message composer">
      <label for="input-field" class="sr-only">Message</label>
      <textarea
        id="input-field"
        placeholder="Message CloudMind..."
        rows="1"
        aria-multiline="true"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" type="button" aria-label="Send message" disabled>
        <!-- Send arrow icon -->
        <svg class="icon-send" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
          <path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <!-- Spinner icon -->
        <svg class="icon-spinner" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-dasharray="28" stroke-dashoffset="10"/>
        </svg>
      </button>
    </div>
    <p class="composer-hint" aria-hidden="true">Enter to send &nbsp;&middot;&nbsp; Shift+Enter for new line</p>
  </footer>

  <script>
    /* ============================================================
       A — CONSTANTS
    ============================================================ */
    const API_BASE  = 'http://localhost:8080';
    let currentSessionId = null;

    /* ============================================================
       B — API STUBS  (implement these to connect to the server)
    ============================================================ */

    /**
     * Send a user message to the LLM and return the assistant's reply.
     * @param {number} sessionId
     * @param {string} message
     * @returns {Promise<{reply: string, session_id: number, message_id: number}>}
     */
    async function sendMessage(sessionId, message) {
      const response = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ session_id: sessionId, message: message })
      });
      return response.json();
    }

    /**
     * Create a new user.
     * @returns {Promise<{id: number, name: string, created_at: string}>}
     */
    async function createUser() {
      const response = await fetch(`${API_BASE}/users`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name: `User-${Date.now()}` })
      });
      return response.json();
    }

    /**
     * Create a new session for a user.
     * @param {number} userId
     * @returns {Promise<{id: number}>}
     */
    async function createSession(userId) {
      const response = await fetch(`${API_BASE}/sessions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ user_id: userId })
      });
      return response.json();
    }

    /**
     * Load all messages for a session in chronological order.
     * @param {number} sessionId
     * @returns {Promise<Array<{id: number, session_id: number, role: string, content: string, created_at: string}>>}
     */
    async function loadHistory(sessionId) {
      const response = await fetch(`${API_BASE}/sessions/${sessionId}/messages`, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json'
        }
      });
      return response.json();
    }

    async function newConversation() {
      const session = await createSession(localStorage.getItem('user_id'));
      localStorage.setItem('session_id', session.id);
      currentSessionId = parseInt(session.id);
      messageList.innerHTML = '';
      emptyState.classList.remove('hidden');
      emptyState.setAttribute('aria-hidden', 'false');
      inputField.focus();
    }

    /* ============================================================
       C — DOM REFERENCES + STATE
    ============================================================ */
    const chatMain    = document.getElementById('chat-main');
    const messageList = document.getElementById('message-list');
    const emptyState  = document.getElementById('empty-state');
    const inputField  = document.getElementById('input-field');
    const sendBtn     = document.getElementById('send-btn');
    const statusDot   = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');

    let isLoading = false;
    let typingEl  = null;

    /* ============================================================
       D — UI FUNCTIONS
    ============================================================ */

    function setStatus(connected) {
      statusDot.classList.remove('status-dot--online', 'status-dot--offline');
      statusDot.classList.add(connected ? 'status-dot--online' : 'status-dot--offline');
      statusLabel.textContent = connected ? 'Connected' : 'Disconnected';
    }

    function setLoading(loading) {
      isLoading = loading;
      sendBtn.disabled = loading || inputField.value.trim() === '';
      sendBtn.classList.toggle('is-loading', loading);

      if (loading) {
        typingEl = createTypingIndicator();
        messageList.appendChild(typingEl);
        scrollToBottom();
      } else if (typingEl) {
        typingEl.remove();
        typingEl = null;
      }
    }

    function createTypingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', 'message--typing');
      wrapper.setAttribute('data-role', 'assistant');
      wrapper.setAttribute('aria-label', 'CloudMind is thinking');

      const avatar = document.createElement('span');
      avatar.classList.add('message-avatar');
      avatar.setAttribute('aria-hidden', 'true');
      avatar.textContent = 'CM';

      const content = document.createElement('div');
      content.classList.add('message-content');

      const delays = [0, 150, 300];
      delays.forEach((delay) => {
        const dot = document.createElement('span');
        dot.classList.add('typing-dot');
        dot.style.setProperty('--delay', `${delay}ms`);
        content.appendChild(dot);
      });

      wrapper.appendChild(avatar);
      wrapper.appendChild(content);
      return wrapper;
    }

    function appendMessage(role, content) {
      if (emptyState && !emptyState.classList.contains('hidden')) {
        emptyState.classList.add('hidden');
        emptyState.setAttribute('aria-hidden', 'true');
      }

      const wrapper = document.createElement('div');
      wrapper.classList.add('message');
      wrapper.setAttribute('data-role', role);

      if (role === 'assistant') {
        const avatar = document.createElement('span');
        avatar.classList.add('message-avatar');
        avatar.setAttribute('aria-hidden', 'true');
        avatar.textContent = 'CM';
        wrapper.appendChild(avatar);
      }

      const contentEl = document.createElement('div');
      contentEl.classList.add('message-content');
      contentEl.textContent = content;

      wrapper.appendChild(contentEl);
      messageList.appendChild(wrapper);
      scrollToBottom();
    }

    function showError(text) {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', 'message--error');

      const contentEl = document.createElement('div');
      contentEl.classList.add('message-content');
      contentEl.textContent = text;

      wrapper.appendChild(contentEl);
      messageList.appendChild(wrapper);
      scrollToBottom();

      setTimeout(() => wrapper.remove(), 8000);
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatMain.scrollTop = chatMain.scrollHeight;
      });
    }

    function autoResizeTextarea() {
      inputField.style.height = 'auto';
      inputField.style.height = `${inputField.scrollHeight}px`;
      sendBtn.disabled = isLoading || inputField.value.trim() === '';
    }

    function renderHistory(messages) {
      messages.forEach((msg) => appendMessage(msg.role, msg.content));
      chatMain.scrollTop = chatMain.scrollHeight;
    }

    /* ============================================================
       E — EVENT WIRING + INIT
    ============================================================ */

    async function handleSend() {
      const text = inputField.value.trim();
      if (!text || isLoading) return;

      inputField.value = '';
      autoResizeTextarea();
      appendMessage('user', text);
      setLoading(true);

      try {
        const result = await sendMessage(currentSessionId, text);
        appendMessage('assistant', result.reply);
      } catch (err) {
        showError('Failed to send message. Is the server running?');
      } finally {
        setLoading(false);
        inputField.focus();
      }
    }

    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    inputField.addEventListener('input', autoResizeTextarea);

    sendBtn.addEventListener('click', handleSend);

    document.querySelectorAll('.suggestion-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        inputField.value = chip.dataset.prompt;
        inputField.focus();
        autoResizeTextarea();
      });
    });

    async function init() {
      try {
        if (!localStorage.getItem('user_id')) {
          const user = await createUser();
          localStorage.setItem('user_id', user.id);
        }
        if (!localStorage.getItem('session_id')) {
          const session = await createSession(localStorage.getItem('user_id'));
          localStorage.setItem('session_id', session.id);
        }
        currentSessionId = parseInt(localStorage.getItem('session_id'));
        const messages = await loadHistory(currentSessionId);
        if (messages && messages.length > 0) {
          renderHistory(messages);
        }
        setStatus(true);
      } catch {
        setStatus(false);
      } finally {
        inputField.focus();
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
